<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Bolo de corte artesanal premium</title>
  <desc id="desc">Composicao editorial com bolo artesanal em camadas, cobertura cremosa e luz suave de confeitaria premium.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9f2"/>
      <stop offset="0.42" stop-color="#EDDEC3"/>
      <stop offset="1" stop-color="#926A2D"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#EDDEC3"/>
    </linearGradient>
    <linearGradient id="cake" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7b4a24"/>
      <stop offset="0.52" stop-color="#3f2418"/>
      <stop offset="1" stop-color="#926A2D"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" x2="1">
      <stop offset="0" stop-color="#AADDF1" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#EBB2D1" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="20%" r="65%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.45" stop-color="#EBB2D1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2c241c" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
